name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and smoke check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: kdv/.python-version
          cache: pip
          cache-dependency-path: kdv/requirements.txt

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: kdv_parser/go.mod
          cache-dependency-path: kdv_parser/go.sum

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r kdv/requirements.txt

      - name: Test Go parser package
        working-directory: kdv_parser
        run: go test ./...

      - name: Build Go parser
        working-directory: kdv_parser
        run: go build -trimpath -o ../kdv/kdv_parser.exe ./cmd/parser

      - name: Compile Python app
        working-directory: kdv
        shell: pwsh
        run: |
          python -m compileall -q kdv_app main.py
          pyinstaller --clean --distpath . --workpath .\__pyinstaller__ .\kdv.spec

      - name: Smoke check build output
        shell: pwsh
        run: |
          $required = @(
            "kdv/kdv.exe",
            "kdv/kdv_parser.exe",
            "kdv/kdv_config.json",
            "kdv/img",
            "kdv/maps"
          )

          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing required build output: $path"
            }
          }

          & .\kdv\kdv_parser.exe -h

      - name: Upload CI artifact
        uses: actions/upload-artifact@v7
        with:
          name: KDV-windows-ci
          path: |
            kdv/kdv.exe
            kdv/kdv_parser.exe
            kdv/kdv_config.json
            kdv/img/**
            kdv/maps/**
          if-no-files-found: error
          retention-days: 7
